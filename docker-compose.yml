services:
  backend:
    image: ghcr.io/${REPO_OWNER:-usedelta-ai}/deltacore/backend:latest
    ports:
      - "${PORT:-8088}:8088"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - PORT=8088
      - NODE_ENV=production
      - EVOLUTION_API_URL=${EVOLUTION_API_URL}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - PASS_KEY=${PASS_KEY}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always

  frontend:
    image: ghcr.io/${REPO_OWNER:-usedelta-ai}/deltacore/frontend:latest
    ports:
      - "8080:80"
    restart: always
