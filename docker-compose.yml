services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${PORT:-8088}:8088"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - PORT=8088
      - NODE_ENV=production
      - EVOLUTION_API_URL=${EVOLUTION_API_URL}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - PASS_KEY=${PASS_KEY}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:8088}
        - VITE_BOARD_URL=${VITE_BOARD_URL}
    ports:
      - "8080:80"
    restart: always
