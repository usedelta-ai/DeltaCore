services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - "${PORT:-8088}:8088"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - PORT=8088
      - NODE_ENV=development
      - EVOLUTION_API_URL=${EVOLUTION_API_URL}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "8080:5173"
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8088}
      - VITE_BOARD_URL=${VITE_BOARD_URL}
    restart: always
